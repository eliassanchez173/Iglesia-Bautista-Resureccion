<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Calendario • Iglesia Bautista Resurrección</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="icon" type="image/png" href="/assets/images/Logo.png" />
</head>
<body>

  <div class="modal-backdrop" id="alertBackdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="alertTitle">
      <h2 id="alertTitle">Aviso Importante</h2>
      <p id="alertMessage"></p>
      <button class="btn btn-primary" id="alertCloseBtn" type="button">Cerrar</button>
    </div>
  </div>

  <header class="site-header" id="siteHeader">
    <a href="index.html" class="brand">
      <span class="brand-title">Iglesia Bautista</span>
      <span class="brand-subtitle">Resurrección</span>
    </a>
    <button class="nav-toggle" id="navToggle" aria-label="Abrir menú">
      <span></span><span></span><span></span>
    </button>
    <nav class="nav" id="mainNav">
      <a class="nav-link" href="index.html">Inicio</a>
      <a class="nav-link" href="quienes-somos.html">Quiénes Somos</a>
      <a class="nav-link" href="actividades.html">Actividades</a>
      <a class="nav-link active" href="calendario.html">Calendario</a>
      <a class="nav-link" href="fotos.html">Fotos</a>
      <a class="nav-link nav-cta" href="donaciones.html">Donar</a>
    </nav>
  </header>

  <div class="page-hero">
    <h1>Calendario</h1>
    <p>Eventos y actividades de nuestra congregación.</p>
  </div>

  <main>
    <section class="section">
      <div class="card" style="padding: 0; overflow: hidden;">
        <iframe
          src="https://calendar.google.com/calendar/embed?src=ibrdnj%40gmail.com&ctz=America%2FNew_York"
          style="border: 0; display: block;"
          width="100%"
          height="650"
          frameborder="0"
          scrolling="no">
        </iframe>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-name">Iglesia Bautista Resurrección</div>
    <div class="footer-info">203 Washington Ave, Dumont, NJ 07628 &nbsp;•&nbsp; ibrdnj@gmail.com</div>
  </footer>

  <script src="assets/js/main.js"></script>
  <script>
    const header = document.getElementById('siteHeader');
    window.addEventListener('scroll', () => header.classList.toggle('scrolled', window.scrollY > 40));
    document.getElementById('navToggle').addEventListener('click', () =>
      document.getElementById('mainNav').classList.toggle('open'));
  </script>
</body>
</html>
